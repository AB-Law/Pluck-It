[pytest]
asyncio_mode = auto
addopts = --strict-markers
testpaths =
    PluckIt.Processor/tests
    PluckIt.Segmentation.Modal/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast unit tests (no external I/O)
    integration: tests requiring Docker / real Cosmos emulator
