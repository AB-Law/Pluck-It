<section class="max-w-6xl mx-auto px-4 py-8 grid gap-6 md:grid-cols-[minmax(0,2fr)_minmax(0,3fr)]">
  <div class="space-y-4">
    <header>
      <h1 class="text-xl font-semibold">Stylist</h1>
      <p class="text-sm text-gray-400">
        Ask for any vibe or occasion. I’ll only use pieces from your archive.
      </p>
    </header>

    <div class="card p-4 space-y-3 h-[20rem] overflow-y-auto text-sm">
      <div *ngFor="let msg of messages">
        <div
          class="max-w-[90%] rounded-2xl px-3 py-2 mb-2"
          [ngClass]="{
            'bg-accent/90 text-black ml-auto': msg.from === 'user',
            'bg-white/5 text-gray-100 mr-auto': msg.from === 'stylist'
          }"
        >
          {{ msg.text }}
        </div>
      </div>
      <div *ngIf="loading" class="text-xs text-gray-400">Thinking about outfits…</div>
    </div>

    <form
      class="flex gap-3"
      (ngSubmit)="send()"
    >
      <input
        type="text"
        class="flex-1 rounded-xl bg-surface border border-white/10 px-3 py-2 text-sm outline-none focus:border-accent"
        placeholder="e.g. Cozy weekend coffee run fit"
        [(ngModel)]="input"
        name="prompt"
      />
      <button
        type="submit"
        class="btn-accent text-sm"
        [disabled]="loading"
      >
        Ask
      </button>
    </form>
  </div>

  <div class="space-y-3">
    <h2 class="text-sm font-medium text-gray-200">Outfit suggestions</h2>
    <div *ngIf="!recommendations.length" class="text-xs text-gray-500">
      Your looks will appear here once you ask the stylist.
    </div>

    <div class="space-y-3">
      <article
        *ngFor="let rec of recommendations"
        class="card p-4 space-y-2 text-sm"
      >
        <h3 class="font-semibold text-gray-50">{{ rec.title }}</h3>
        <p class="text-gray-300 text-xs">
          {{ rec.description }}
        </p>
        <div class="flex flex-wrap gap-1 mt-1">
          <span
            *ngFor="let id of rec.clothingItemIds"
            class="pill"
          >
            {{ id }}
          </span>
        </div>
      </article>
    </div>
  </div>
</section>
