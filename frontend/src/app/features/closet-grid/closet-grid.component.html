<section class="max-w-6xl mx-auto px-4 py-8 space-y-6">
  <header class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-semibold">Closet</h1>
      <p class="text-sm text-gray-400">Plucked garments, ready to style.</p>
    </div>
  </header>

  <div *ngIf="items().length === 0" class="text-sm text-gray-400">
    No garments yet. Upload a photo to the <span class="font-mono">uploads</span> container to see it appear here after processing.
  </div>

  <div
    class="grid gap-4"
    [ngClass]="{
      'grid-cols-2 sm:grid-cols-3 md:grid-cols-4': items().length > 0
    }"
  >
    <article
      *ngFor="let item of items()"
      class="card overflow-hidden flex flex-col"
    >
      <div class="aspect-[3/4] bg-black/40 flex items-center justify-center">
        <img
          [src]="item.imageUrl"
          alt=""
          class="h-full w-full object-contain"
          loading="lazy"
        />
      </div>
      <div class="p-3 space-y-2">
        <div class="flex items-center justify-between text-xs text-gray-400">
          <span class="uppercase tracking-wide">{{ item.category || 'Unsorted' }}</span>
          <span>{{ item.brand || 'Unknown brand' }}</span>
        </div>
        <div class="flex flex-wrap gap-1">
          <span *ngFor="let tag of item.tags" class="pill">
            {{ tag }}
          </span>
        </div>
      </div>
    </article>
  </div>
</section>
