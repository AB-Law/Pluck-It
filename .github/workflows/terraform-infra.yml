name: Terraform Infra

on:
  workflow_dispatch:
  push:
    paths:
      - "infra/**"
    branches:
      - main
  pull_request:
    paths:
      - "infra/**"

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.terraform-plugin-cache
          key: terraform-providers-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-providers-${{ runner.os }}-

      - name: Create Terraform plugin cache dir
        run: mkdir -p ${{ github.workspace }}/.terraform-plugin-cache

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Create terraform.tfvars
        working-directory: infra
        env:
          SEGMENTATION_ENDPOINT_URL: ${{ secrets.SEGMENTATION_ENDPOINT_URL }}
          SEGMENTATION_SHARED_TOKEN: ${{ secrets.SEGMENTATION_SHARED_TOKEN }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          GRAFANA_CLOUD_OTLP_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          GRAFANA_CLOUD_OTLP_HEADERS: ${{ secrets.GRAFANA_CLOUD_OTLP_HEADERS }}
          GRAFANA_CLOUD_OTEL_SERVICE_NAME_PROCESSOR: ${{ vars.GRAFANA_CLOUD_OTEL_SERVICE_NAME_PROCESSOR }}
          GRAFANA_CLOUD_OTEL_SERVICE_NAME_API: ${{ vars.GRAFANA_CLOUD_OTEL_SERVICE_NAME_API }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          GOOGLE_OAUTH_ALLOWED_CLIENT_IDS: ${{ secrets.GOOGLE_OAUTH_ALLOWED_CLIENT_IDS }}
        run: |
          cat > terraform.auto.tfvars <<'OUTER'
          subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          location = "centralindia"
          ai_gpt4o_endpoint = "${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          ai_api_key = "${{ secrets.AZURE_OPENAI_API_KEY }}"
          google_oauth_client_id = "${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
          google_oauth_allowed_client_ids = "${{ secrets.GOOGLE_OAUTH_ALLOWED_CLIENT_IDS }}"
          swa_repository_url = "https://github.com/AB-Law/Pluck-It"
          swa_repository_branch = "main"
          swa_repository_token = "${{ secrets.SWA_REPOSITORY_TOKEN }}"
          OUTER

          python3 -c "import json, os; u=''.join(os.environ['SEGMENTATION_ENDPOINT_URL'].splitlines()); t=''.join(os.environ['SEGMENTATION_SHARED_TOKEN'].splitlines()); open('terraform.auto.tfvars','a').write('segmentation_endpoint_url = '+json.dumps(u)+'\\nsegmentation_shared_token = '+json.dumps(t)+'\\n')"

          if [ -n "$CORS_ALLOWED_ORIGINS" ]; then
            echo "cors_allowed_origins = $CORS_ALLOWED_ORIGINS" >> terraform.auto.tfvars
          else
            echo 'cors_allowed_origins = []' >> terraform.auto.tfvars
          fi

          if [ -n "$GRAFANA_CLOUD_OTLP_ENDPOINT" ]; then
            echo "grafana_cloud_otlp_endpoint = \"$GRAFANA_CLOUD_OTLP_ENDPOINT\"" >> terraform.auto.tfvars
          fi
          if [ -n "$GRAFANA_CLOUD_OTLP_HEADERS" ]; then
            echo "grafana_cloud_otlp_headers = \"$GRAFANA_CLOUD_OTLP_HEADERS\"" >> terraform.auto.tfvars
          fi
          if [ -n "$GRAFANA_CLOUD_OTEL_SERVICE_NAME_PROCESSOR" ]; then
            echo "grafana_cloud_processor_service_name = \"$GRAFANA_CLOUD_OTEL_SERVICE_NAME_PROCESSOR\"" >> terraform.auto.tfvars
          fi
          if [ -n "$GRAFANA_CLOUD_OTEL_SERVICE_NAME_API" ]; then
            echo "grafana_cloud_api_service_name = \"$GRAFANA_CLOUD_OTEL_SERVICE_NAME_API\"" >> terraform.auto.tfvars
          fi
          python3 - <<'PY'
          import json
          import os

          values = [
            ("langfuse_public_key", os.environ.get("LANGFUSE_PUBLIC_KEY", "")),
            ("langfuse_secret_key", os.environ.get("LANGFUSE_SECRET_KEY", "")),
            ("langfuse_host", os.environ.get("LANGFUSE_HOST", "")),
          ]

          lines = []
          for key, value in values:
              if not value:
                  continue
              safe_value = "".join(value.splitlines())
              lines.append(f"{key} = {json.dumps(safe_value)}")

          if lines:
              with open("terraform.auto.tfvars", "a", encoding="utf-8") as fp:
                  fp.write("\n".join(lines) + "\n")
          PY

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Fmt
        working-directory: infra
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: infra
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.event_name != 'pull_request'
        working-directory: infra
        run: terraform apply -auto-approve -input=false

