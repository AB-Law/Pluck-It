name: Backend (Functions) CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Functions/**'
      - 'PluckIt.Core/**'
      - 'PluckIt.Infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Functions/**'
      - 'PluckIt.Core/**'
      - 'PluckIt.Infrastructure/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: azure-production-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ (github.ref == 'refs/heads/main' && github.event_name == 'push') && 'production' || '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore PluckIt.sln

    - name: Build
      run: dotnet build PluckIt.sln --no-restore --configuration Release

    - name: Publish
      run: dotnet publish PluckIt.Functions/PluckIt.Functions.csproj --no-build --configuration Release --output ./publish

    - name: Azure Login
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: azure/functions-action@v1
      with:
        app-name: 'pluckit-prod-api-func'
        package: './publish'
