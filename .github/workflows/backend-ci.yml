name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Api/**'
      - 'PluckIt.Core/**'
      - 'PluckIt.Infrastructure/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Api/**'
      - 'PluckIt.Core/**'
      - 'PluckIt.Infrastructure/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore PluckIt.sln
    
    - name: Build
      run: dotnet build PluckIt.sln --no-restore --configuration Release
    
    - name: Test
      run: dotnet test PluckIt.sln --no-build --configuration Release --verbosity normal
    
    - name: Publish
      run: dotnet publish PluckIt.Api/PluckIt.Api.csproj --configuration Release --output ./publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pluckit-api
        path: ./publish/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: pluckit-api
        path: ./publish
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'pluckit-prod-api'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
