name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'PluckIt.Client/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'PluckIt.Client/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: PluckIt.Client

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: PluckIt.Client/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Test
      run: npm run test -- --watch=false --browsers=ChromeHeadless
    
    - name: Build
      run: npm run build -- --configuration production
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pluckit-client
        path: PluckIt.Client/dist/
