name: Function App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Create requirements.txt and install dependencies
      run: |
        python -c "import tomllib; print('\\n'.join(tomllib.load(open('pyproject.toml','rb'))['project']['dependencies']))" > requirements.txt
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"
        echo "Contents of current directory:"
        ls -la
        if [ -d ".python_packages" ]; then
          echo "✓ Python packages directory created successfully"
          du -sh .python_packages
        else
          echo "✗ ERROR: Python packages directory not created"
          exit 1
        fi
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }
    
    - name: Deploy to Azure Functions
      run: |
        echo "Creating deployment package..."
        ls -la
        if [ -d ".python_packages" ]; then
          echo "✓ Python packages found before zipping"
          du -sh .python_packages
        else
          echo "✗ ERROR: No .python_packages directory"
          exit 1
        fi
        zip -r ../function-app.zip .
        echo "Deploying to Azure..."
        az functionapp deployment source config-zip \
          --resource-group PluckIt-RG \
          --name pluckit-prod-processor-func \
          --src ../function-app.zip \
          --timeout 300
