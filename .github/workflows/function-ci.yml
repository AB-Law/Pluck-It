name: Function App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

#Needed since infra might cause conflicts if both run at same time
concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: PluckIt.Processor/requirements.txt

    - name: Install runtime + dev dependencies
      run: pip install -r requirements.txt && pip install pytest pytest-asyncio pytest-cov httpx anyio[trio]

    - name: Run unit tests
      run: python -m pytest tests/unit/ -v --tb=short -m unit --cov=. --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: python-coverage
        path: PluckIt.Processor/coverage.xml

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: PluckIt.Processor/requirements.txt

    - name: Install dependencies (pre-build for Linux target)
      run: |
        pip install \
          --target .python_packages/lib/site-packages \
          --no-compile \
          -r requirements.txt

    - name: Cache ML models
      id: cache-ml-models
      uses: actions/cache@v4
      with:
        path: PluckIt.Processor/models
        key: ml-models-u2net-v0.0.0

    - name: Download ML models
      if: steps.cache-ml-models.outputs.cache-hit != 'true'
      run: |
        mkdir -p models
        curl -fSL "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx" \
          -o models/u2net.onnx
        echo "u2net.onnx: $(du -h models/u2net.onnx | cut -f1)"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      uses: azure/functions-action@v1
      with:
        app-name: 'pluckit-prod-processor-func'
        package: './PluckIt.Processor'
        respect-funcignore: true
