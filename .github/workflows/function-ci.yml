name: Function App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"
        echo "✓ Packages installed"
        du -sh .python_packages

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      run: |
        zip -r ../function-app.zip . --exclude "*.pyc" --exclude "__pycache__/*" --exclude "local.settings.json"
        echo "Zip size: $(du -sh ../function-app.zip)"
        az functionapp deployment source config-zip \
          --resource-group PluckIt-RG \
          --name pluckit-prod-processor-func \
          --src ../function-app.zip \
          --timeout 600
        echo "✓ Deployed successfully"
