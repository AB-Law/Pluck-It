name: Function App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies (pre-build for Linux target)
      run: |
        pip install \
          --target .python_packages/lib/site-packages \
          --platform manylinux2014_x86_64 \
          --implementation cp \
          --python-version 3.12 \
          --only-binary :all: \
          --upgrade \
          -r requirements.txt || \
        pip install \
          --target .python_packages/lib/site-packages \
          -r requirements.txt

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      run: |
        # Bundle source + pre-built packages; disable remote build so the zip is used as-is
        zip -r ../function-app.zip . \
          --exclude "*.pyc" \
          --exclude "__pycache__/*" \
          --exclude "local.settings.json"
        echo "Zip size: $(du -sh ../function-app.zip)"
        # Disable remote build — packages are already bundled
        az functionapp config appsettings set \
          --resource-group PluckIt-RG \
          --name pluckit-prod-processor-func \
          --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_RUN_FROM_PACKAGE=1 \
          --output none
        az functionapp deployment source config-zip \
          --resource-group PluckIt-RG \
          --name pluckit-prod-processor-func \
          --src ../function-app.zip \
          --timeout 600
        echo "✓ Deployed successfully"
