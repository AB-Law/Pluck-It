name: Function App CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

#Needed since infra might cause conflicts if both run at same time
concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: |
          PluckIt.Processor/requirements-prod.txt
          PluckIt.Processor/requirements-test.txt

    - name: Install runtime + test dependencies
      run: |
        pip install -r requirements-prod.txt
        pip install -r requirements-test.txt

    - name: Run unit tests
      run: python -m pytest tests/unit/ -v --tb=short -m unit --cov=. --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: python-coverage
        path: PluckIt.Processor/coverage.xml

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: PluckIt.Processor/requirements-prod.txt

    - name: Cache runtime site-packages
      id: cache-python-packages
      uses: actions/cache@v4
      with:
        path: PluckIt.Processor/.python_packages
        key: py-packages-${{ runner.os }}-${{ hashFiles('PluckIt.Processor/requirements-prod.txt') }}
        restore-keys: |
          py-packages-${{ runner.os }}-

    - name: Install production dependencies (pre-build for Linux target)
      if: steps.cache-python-packages.outputs.cache-hit != 'true'
      run: |
        pip install \
          --target .python_packages/lib/site-packages \
          --no-compile \
          -r requirements-prod.txt

    - name: Print deploy artifact size baseline
      run: |
        echo "Function app source:"
        du -sh .
        echo "Installed site-packages:"
        du -sh .python_packages

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      uses: azure/functions-action@v1
      with:
        app-name: 'pluckit-prod-processor-func'
        package: './PluckIt.Processor'
        respect-funcignore: true
