name: Function App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'PluckIt.Processor/**'
      - '.github/workflows/function-ci.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    defaults:
      run:
        working-directory: PluckIt.Processor

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to Azure Functions
      run: |
        # Zip only source files — Azure remote build installs requirements.txt server-side
        zip -r ../function-app.zip . \
          --exclude "*.pyc" \
          --exclude "__pycache__/*" \
          --exclude "local.settings.json" \
          --exclude ".python_packages/*"
        echo "Zip size: $(du -sh ../function-app.zip)"
        # Use az functionapp deploy (v2 API) which supports --build-remote on Linux Consumption
        az functionapp deploy \
          --resource-group PluckIt-RG \
          --name pluckit-prod-processor-func \
          --src-path ../function-app.zip \
          --type zip \
          --build-remote true
        echo "✓ Deployed successfully"
