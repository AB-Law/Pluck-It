name: Backend (.NET + Functions)

on:
  push:
    branches:
      - main
    paths:
      - "PluckIt.Api/**"
      - "PluckIt.Core/**"
      - "PluckIt.Infrastructure/**"
      - "PluckIt.Processor/**"
  pull_request:
    paths:
      - "PluckIt.Api/**"
      - "PluckIt.Core/**"
      - "PluckIt.Infrastructure/**"
      - "PluckIt.Processor/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.100"

      - name: Restore & Build
        run: |
          dotnet restore PluckIt.sln
          dotnet build PluckIt.sln --configuration Release --no-restore

      - name: Azure Login
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish API
        if: github.event_name == 'push'
        run: dotnet publish PluckIt.Api/PluckIt.Api.csproj -c Release -o ./publish/api

      - name: Deploy API to App Service
        if: github.event_name == 'push'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ./publish/api

      - name: Setup Python
        if: github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Azure Functions Core Tools
        if: github.event_name == 'push'
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install Processor dependencies
        if: github.event_name == 'push'
        working-directory: PluckIt.Processor
        run: |
          python -m pip install --upgrade pip
          pip install -r <(python -c "import tomllib,sys;print('\\n'.join(tomllib.load(open('pyproject.toml','rb'))['project']['dependencies']))") --target="./.python_packages/lib/site-packages"

      - name: Deploy Processor Function App
        if: github.event_name == 'push'
        run: |
          func azure functionapp publish ${{ secrets.AZURE_FUNCTIONAPP_NAME }} --python

